# Replicate Cog: Qwen Camera Control (Multi-Angle)
# Bakes model weights into the image for fast cold starts (recommended by Replicate).

build:
  gpu: true
  python_version: "3.11"
  system_packages:
    - "git"
  python_requirements: requirements.txt
  run:
    - "pip install huggingface_hub hf-transfer"
    - "mkdir -p /src/weights /src/hf_cache"
    - "HF_HUB_ENABLE_HF_TRANSFER=1 python -c \"from huggingface_hub import snapshot_download; snapshot_download('Qwen/Qwen-Image-Edit-2509', cache_dir='/src/hf_cache', local_dir='/src/weights/base', local_dir_use_symlinks=False, ignore_patterns=['transformer/*'])\" && rm -rf /src/hf_cache"
    - "HF_HUB_ENABLE_HF_TRANSFER=1 python -c \"from huggingface_hub import snapshot_download; snapshot_download('linoyts/Qwen-Image-Edit-Rapid-AIO', cache_dir='/src/hf_cache', local_dir='/src/weights/transformer', local_dir_use_symlinks=False, ignore_patterns=['*transformer_weights.safetensors'])\" && rm -rf /src/hf_cache"
    - "HF_HUB_ENABLE_HF_TRANSFER=1 python -c \"from huggingface_hub import snapshot_download; snapshot_download('dx8152/Qwen-Edit-2509-Multiple-angles', cache_dir='/src/hf_cache', local_dir='/src/weights/lora', local_dir_use_symlinks=False)\" && rm -rf /src/hf_cache"

predict: "predict.py:Predictor"
