# Build and push Cog model to Replicate on every push to main.
# Uses replicate/setup-cog action which handles Docker + Cog installation.
# Aggressively frees disk (~50GB+) to fit the ~25GB model weights + Docker layers.

name: Push to Replicate

on:
  push:
    branches: [main]
    paths:
      - "predict.py"
      - "cog.yaml"
      - "requirements.txt"
      - "qwenimage/**"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Check disk space
        run: df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Push to Replicate
        run: |
          # Use DOCKER_BUILDKIT with no cache to avoid filling disk with layers
          DOCKER_BUILDKIT=1 cog push r8.im/realimposter/qwen-camera-control
